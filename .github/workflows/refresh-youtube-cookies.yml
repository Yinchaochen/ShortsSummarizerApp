name: Refresh YouTube Cookies

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + requests
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Restore Playwright auth state
        run: |
          echo "${{ secrets.PLAYWRIGHT_AUTH }}" | base64 -d > /tmp/auth.json

      - name: Export YouTube cookies
        id: export
        run: python scripts/export_cookies.py
        env:
          AUTH_FILE: /tmp/auth.json
          COOKIE_OUTPUT: /tmp/yt_cookies.txt

      - name: Update Railway YOUTUBE_COOKIES
        run: python scripts/update_railway_env.py
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENV_ID: ${{ secrets.RAILWAY_ENV_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          COOKIE_OUTPUT: /tmp/yt_cookies.txt

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cookie-refresh-failed',
            });
            // Avoid duplicate issues
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'YouTube cookies refresh failed — manual update needed',
                labels: ['cookie-refresh-failed'],
                body: [
                  '## Automated cookie refresh failed',
                  '',
                  'The weekly GitHub Action for refreshing YouTube cookies has failed.',
                  'This usually means the saved login session (`PLAYWRIGHT_AUTH`) has expired.',
                  '',
                  '### Steps to fix',
                  '1. On your computer, run:',
                  '   ```bash',
                  '   pip install playwright',
                  '   playwright install chromium',
                  '   playwright codegen --save-storage=auth.json https://www.youtube.com',
                  '   ```',
                  '2. Log in to YouTube in the browser that opens, then close the window.',
                  '3. Encode the file and update the secret:',
                  '   ```bash',
                  '   # Linux/Mac:',
                  '   base64 -w 0 auth.json',
                  '   # Windows PowerShell:',
                  '   [Convert]::ToBase64String([IO.File]::ReadAllBytes("auth.json"))',
                  '   ```',
                  '4. Go to **GitHub → Settings → Secrets → PLAYWRIGHT_AUTH** and paste the output.',
                  '5. Re-run this workflow manually.',
                  '',
                  '*Generated by refresh-youtube-cookies.yml*',
                ].join('\n'),
              });
            }
